  @keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

</helmet>
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 50% -10%,#1c1730,#0c0a13 70%);padding:24px;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#F5F5F7;">
  <div style="width:1232px;height:772px;border-radius:14px;overflow:hidden;display:flex;box-shadow:0 40px 120px rgba(0,0,0,.65),0 0 0 1px rgba(255,255,255,.04);border:1px solid #3E3756;">

    <div style="width:236px;flex:none;background:linear-gradient(180deg,#241C35,#15101f);border-right:1px solid #2c2640;box-sizing:border-box;display:flex;flex-direction:column;overflow:hidden;">
      <div style="display:flex;gap:8px;padding:14px 16px 10px;">
        <span style="width:12px;height:12px;border-radius:50%;background:#ff5f57;"></span>
        <span style="width:12px;height:12px;border-radius:50%;background:#febc2e;"></span>
        <span style="width:12px;height:12px;border-radius:50%;background:#28c840;"></span>
      </div>
      <div style="display:flex;align-items:center;gap:9px;padding:6px 16px 14px;">
        <div style="width:22px;height:22px;border-radius:50%;border:3px solid #7674FF;border-right-color:transparent;transform:rotate(-45deg);"></div>
        <span style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16px;letter-spacing:.3px;">CleanMac</span>
      </div>
      <div style="flex:1;overflow-y:auto;padding:2px 8px 12px;">
        <sc-for list="{{ navRows }}" as="row" hint-placeholder-count="14">
          <sc-if value="{{ row.isHeader }}" hint-placeholder-val="{{ false }}">
            <div style="{{ row.headerStyle }}">{{ row.title }}</div>
          </sc-if>
          <sc-if value="{{ row.isItem }}" hint-placeholder-val="{{ true }}">
            <div onClick="{{ row.pick }}" style="{{ row.rowStyle }}">
              <span style="{{ row.dotStyle }}"></span>
              <span style="font-size:13px;font-weight:500;flex:1;">{{ row.name }}</span>
              <sc-if value="{{ row.hasBadge }}" hint-placeholder-val="{{ false }}"><span style="{{ row.badgeStyle }}">{{ row.badge }}</span></sc-if>
            </div>
          </sc-if>
        </sc-for>
      </div>
    </div>

    <div style="flex:1;position:relative;background:linear-gradient(180deg,#33264A,#241C35 55%,#15101f);display:flex;flex-direction:column;min-width:0;overflow:hidden;">
      {{ starLayer }}
      {{ main }}
    </div>
  </div>
</div>

      case 'snapshots': main = this.screenPipeline('snapshots', cfg.snapshots); break;
      case 'iosBackups': main = this.screenPipeline('iosBackups', cfg.iosBackups); break;
      case 'privacy': main = this.screenPipeline('privacy', cfg.privacy); break;
      case 'uninstaller': main = this.screenUninstaller(cfg.uninstallerLeftovers, accent); break;
      case 'startup': main = this.screenStartup(); break;
      case 'trash': main = this.screenTrash(); break;
      default: main = this.screenDashboard();
    }
    return { navRows: this.buildNavRows(), starLayer: this.buildStars(), main };
  }
}
</script>
